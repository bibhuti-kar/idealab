apiVersion: v1
kind: Service
metadata:
  name: api-server
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "ai-stack.labels" . | nindent 4 }}
    {{- include "ai-stack.api.selectorLabels" . | nindent 4 }}
spec:
  type: {{ .Values.api.serviceType }}
  ports:
    - name: http
      port: {{ .Values.api.port }}
      targetPort: http
      protocol: TCP
      {{- if eq .Values.api.serviceType "NodePort" }}
      nodePort: {{ .Values.api.nodePort }}
      {{- end }}
  selector:
    {{- include "ai-stack.api.selectorLabels" . | nindent 4 }}
