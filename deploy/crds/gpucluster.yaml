apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: gpuclusters.idealab.io
spec:
  group: idealab.io
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                driver:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                      default: true
                    version:
                      type: string
                devicePlugin:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                      default: true
                gpuFeatureDiscovery:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                      default: true
                applicationProfiles:
                  type: array
                  items:
                    type: object
                    required: [name, helmChart]
                    properties:
                      name:
                        type: string
                        minLength: 1
                      helmChart:
                        type: string
                        minLength: 1
                      helmValues:
                        type: object
                        x-kubernetes-preserve-unknown-fields: true
                      resources:
                        type: object
                        properties:
                          gpuCount:
                            type: integer
                            default: 1
                          gpuMemory:
                            type: string
                          cpuLimit:
                            type: string
                          memoryLimit:
                            type: string
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum: [Pending, Discovering, Ready, Error]
                node:
                  type: object
                  properties:
                    hostname:
                      type: string
                    cpu:
                      type: object
                      properties:
                        model:
                          type: string
                        cores:
                          type: integer
                        threads:
                          type: integer
                        features:
                          type: array
                          items:
                            type: string
                    gpu:
                      type: object
                      properties:
                        model:
                          type: string
                        vramMB:
                          type: integer
                        driverVersion:
                          type: string
                        cudaVersion:
                          type: string
                        computeCapability:
                          type: string
                    memory:
                      type: object
                      properties:
                        totalMB:
                          type: integer
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time
                      reason:
                        type: string
                      message:
                        type: string
                profileStatuses:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      configMapName:
                        type: string
                      ready:
                        type: boolean
                resourceWarning:
                  type: string
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: GPU
          type: string
          jsonPath: .status.node.gpu.model
        - name: VRAM
          type: integer
          jsonPath: .status.node.gpu.vramMB
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
  scope: Cluster
  names:
    plural: gpuclusters
    singular: gpucluster
    kind: GPUCluster
    shortNames:
      - gc
