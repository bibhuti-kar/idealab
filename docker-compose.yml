services:
  operator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: idealab-operator
    env_file: .env
    ports:
      - "8081:8081"
    volumes:
      - ./deploy:/deploy:ro
      - /var/run/containerd/containerd.sock:/var/run/containerd/containerd.sock:ro
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: true
    networks:
      - idealab

  # For local development with hot reload
  operator-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    container_name: idealab-operator-dev
    command: go run ./cmd/operator
    env_file: .env
    ports:
      - "8081:8081"
    volumes:
      - .:/app
    profiles:
      - dev
    networks:
      - idealab

networks:
  idealab:
    driver: bridge
