apiVersion: v1
kind: ConfigMap
metadata:
  name: ai-stack-config
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "ai-stack.labels" . | nindent 4 }}
data:
  # URL for the Ollama inference server (ClusterIP service).
  # All CPU-only services use this to reach the LLM.
  OLLAMA_URL: "http://ollama:{{ .Values.ollama.port }}"
  OLLAMA_MODEL: {{ .Values.ollama.model | quote }}
  API_PORT: {{ .Values.api.port | quote }}
