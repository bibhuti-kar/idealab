apiVersion: idealab.io/v1alpha1
kind: GPUCluster
metadata:
  name: my-gpu-cluster
spec:
  driver:
    enabled: true
    version: "560"
  devicePlugin:
    enabled: true
  gpuFeatureDiscovery:
    enabled: true
  applicationProfiles:
    - name: ollama-inference
      helmChart: ollama/ollama
      helmValues:
        ollama:
          gpu:
            enabled: true
          models:
            - phi3:mini
        service:
          type: NodePort
          nodePort: 30080
      resources:
        gpuCount: 1
        gpuMemory: "4Gi"
        cpuLimit: "4"
        memoryLimit: "8Gi"
