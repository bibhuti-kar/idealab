# -- Multi-service AI Stack values
# GPU service (Ollama) runs the LLM; API service provides REST endpoints.

# -- Ollama: GPU-accelerated LLM inference server
ollama:
  image: ollama/ollama:latest
  # Model to pull on startup. Must fit in available VRAM.
  # For 6GB VRAM (GTX 1660 Ti): phi3:mini, llama3.2:3b, mistral:7b-q4_0, gemma2:2b
  # For 8GB+ VRAM: llama3.1:8b, codellama:7b, mistral:7b
  model: "phi3:mini"
  port: 11434
  gpu:
    # Number of GPUs to request. Set to 0 for CPU-only inference.
    count: 1
    # Shared memory size for model loading. Increase for larger models.
    shmSize: "2Gi"
  resources:
    requests:
      cpu: "1000m"
      memory: "4Gi"
    limits:
      cpu: "4000m"
      memory: "8Gi"
  persistence:
    # Persistent storage for downloaded models (survives pod restarts)
    enabled: true
    size: "20Gi"
    storageClass: "local-path"

# -- API server: CPU-only service that calls Ollama
api:
  # Replace with your own API server image.
  # This default runs a simple curl-based proxy for demonstration.
  image: python:3.12-slim
  replicas: 1
  port: 8000
  serviceType: NodePort
  nodePort: 30080
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

# -- Namespace for the workload
namespace: ai-workloads
